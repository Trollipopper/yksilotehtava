<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Opis Ravintolat näyttää opiskelijaravintolat kartalla ja korostaa lähimmän vaihtoehdon."
    />
    <title>Kartta | Opis Ravintolat</title>
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/kartta.css" />
    <script src="../js/main.js" defer></script>
  </head>
  <body class="page page-map">
    <header class="site-header">
      <div class="container navbar">
        <a
          class="brand"
          href="etusivu.html"
          aria-label="Opis Ravintolat etusivu"
        >
          <span class="brand-mark">OR</span>
          <span class="brand-text">
            <strong>Opis Ravintolat</strong>
            <span>Opiskelijaravintolat yhdellä silmäyksellä</span>
          </span>
        </a>

        <nav class="site-nav" aria-label="Päävalikko">
          <a data-nav-link href="etusivu.html">Etusivu</a>
          <a data-nav-link href="ravintolat.html">Ravintolat</a>
          <a data-nav-link href="kartta.html">Kartta</a>
          <a data-nav-link href="yhteystiedot.html">Yhteystiedot</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section page-topline">
        <p>Opis Ravintolat</p>
      </section>

      <section class="section map-layout">
        <div class="map-canvas">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Karttanäkymä</p>
              <h3>Ravintolat</h3>
            </div>
            <span class="pill">Esikatselu</span>
          </div>

          <div
            id="map-pins"
            class="map-pins"
            aria-label="Ravintolapisteet"
          ></div>
        </div>

        <aside class="map-sidebar">
          <article class="surface contact-card">
            <p class="eyebrow">Lähin ravintola</p>
            <div id="nearest-restaurant"></div>
          </article>

          <article class="surface contact-card">
            <p class="eyebrow">Etäisyysjärjestys</p>
            <div id="map-list" class="map-list"></div>
          </article>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <p>Opis Ravintolat</p>
    </footer>
  </body>
</html>
