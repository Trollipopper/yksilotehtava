<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Selaa opiskelijaravintoloita, suodata ne kaupungin tai tarjoajan mukaan ja vaihda päivän sekä viikon ruokalistojen välillä."
    />
    <title>Ravintolat | Opis Ravintolat</title>
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/ravintolat.css" />
    <script src="../js/main.js" defer></script>
  </head>
  <body class="page page-restaurants">
    <header class="site-header">
      <div class="container navbar">
        <a
          class="brand"
          href="etusivu.html"
          aria-label="Opis Ravintolat etusivu"
        >
          <span class="brand-mark">OR</span>
          <span class="brand-text">
            <strong>Opis Ravintolat</strong>
            <span>Opiskelijaravintolat yhdellä silmäyksellä</span>
          </span>
        </a>

        <nav class="site-nav" aria-label="Päävalikko">
          <a data-nav-link href="etusivu.html">Etusivu</a>
          <a data-nav-link href="ravintolat.html">Ravintolat</a>
          <a data-nav-link href="kartta.html">Kartta</a>
          <a data-nav-link href="yhteystiedot.html">Yhteystiedot</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section page-topline">
        <p>Opis Ravintolat</p>
      </section>

      <section class="section toolbar">
        <article class="toolbar-card">
          <div class="toolbar-card__header">
            <p class="eyebrow">Suodattimet</p>
            <h3>Ravintolalista</h3>
          </div>

          <div class="filters-grid">
            <div class="filter-field">
              <label for="restaurant-search"
                >Hae ravintolaa tai ruokalajia</label
              >
              <input
                class="filter-input"
                type="search"
                id="restaurant-search"
                placeholder="Esimerkiksi Helsingin vegaaninen vaihtoehto"
              />
            </div>

            <div class="filter-field">
              <label for="city-filter">Kaupunki</label>
              <select class="filter-select" id="city-filter">
                <option value="all">Kaikki kaupungit</option>
              </select>
            </div>

            <div class="filter-field">
              <label for="provider-filter">Palveluntarjoaja</label>
              <select class="filter-select" id="provider-filter">
                <option value="all">Kaikki tarjoajat</option>
              </select>
            </div>
          </div>
        </article>

        <article class="toolbar-card toolbar-card--period">
          <div class="toolbar-card__header">
            <p class="eyebrow">Aikajakso</p>
            <h3>Ruokalistan näkymä</h3>
          </div>

          <div
            class="period-toggle"
            role="tablist"
            aria-label="Ruokalistan aikajakso"
          >
            <button
              type="button"
              class="toggle-button is-active"
              data-period="day"
              aria-pressed="true"
            >
              Päivä
            </button>
            <button
              type="button"
              class="toggle-button"
              data-period="week"
              aria-pressed="false"
            >
              Viikko
            </button>
          </div>
        </article>
      </section>

      <section class="section restaurant-shell">
        <article class="surface panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Hakutulokset</p>
              <h3>Ravintolat</h3>
            </div>
            <span class="pill"
              ><strong id="restaurant-count">0</strong>&nbsp;kpl</span
            >
          </div>

          <div
            id="restaurant-list"
            class="restaurant-list"
            aria-live="polite"
          ></div>
        </article>

        <article class="menu-card" aria-live="polite">
          <div class="menu-card__header">
            <div>
              <p class="eyebrow">Valittu ravintola</p>
              <h3 id="selected-restaurant-name">-</h3>
            </div>
          </div>

          <div id="selected-restaurant-info" class="page-intro"></div>
          <div id="menu-panel"></div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <p>Opis Ravintolat</p>
    </footer>
  </body>
</html>
